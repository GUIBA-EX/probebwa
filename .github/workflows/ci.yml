name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Overrides `.cargo/config.toml`'s `-C target-cpu=native` (an env RUSTFLAGS
  # replaces the config value entirely, it doesn't merge with it). On cloud
  # VMs, LLVM's host-CPU detection can report features the hypervisor
  # actually masks off, so a `target-cpu=native` build can emit instructions
  # the runner then refuses at SIGILL -- a real failure mode other Rust
  # bioinformatics projects have hit in CI (not hypothetical here just
  # because it hasn't happened yet). Local/production builds are unaffected;
  # this only weakens the compiler's codegen for the CI job itself, which
  # isn't measuring performance anyway.
  RUSTFLAGS: ""

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry/build
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --all-targets

      - name: Test (release)
        run: cargo test --release

      - name: Clippy (release, deny warnings)
        run: cargo clippy --release --all-targets -- -D warnings
